# Streamlit専用の秘密設定ファイルです。
# 本番環境（Streamlit Community Cloud）では、このファイルではなく
# ダッシュボードから直接 Secrets を入力してください。

# GeminiのAPIキー（.envに書いてあるものと同じ）
GEMINI_API_KEY = "ここに入力するか、.envのままでも動きます"

# SupabaseのデータベースURL（接続文字列）
# 例: "postgresql://postgres:[YOUR-PASSWORD]@db.[YOUR-PROJECT-REF].supabase.co:5432/postgres"
SUPABASE_DB_URL = "postgres://..."
